<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Quant Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background-color: #1e293b; padding: 40px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #334155; border-radius: 5px; background-color: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0ea5e9; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        button:hover { background-color: #0284c7; }
        .links { text-align: center; margin-top: 15px; font-size: 0.9em; }
        .links a { color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>Trader Login</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Login</button>
        </form>
        <div class="links">
            <p>Need an account? <a href="{% url 'register' %}">Sign up here</a></p>
        </div>
    </div>
</body>
</html>
